<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Do You Love Me?</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #ffc3a0);
  background-size: 400% 400%;
  animation: gradientBG 8s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  text-align: center;
}

h1 {
  margin-bottom: 30px;
  color: #333;
  font-size: 38px;
}

.buttons {
  position: relative;
  display: inline-block;
}

button {
  width: 150px;
  padding: 10px 0;
  font-size: 22px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

#yesBtn {
  background: #28a745;
  color: white;
}

#noBtn {
  background: #dc3545;
  color: white;
  position: absolute;
  left: 170px;
  top: 0;
}

/* floating hearts */
.heart {
  position: fixed;
  animation: floatUp 4s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-600px); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
  <h1 id="question">Do you love me? ❤️</h1>
  <div class="buttons">
    <button id="yesBtn">Yes 😍</button>
    <button id="noBtn">No 😢</button>
  </div>
</div>

<!-- Romantic music -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-love-ambient-11037.mp3" type="audio/mpeg">
</audio>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const question = document.getElementById("question");
const music = document.getElementById("music");

let noClicks = 0;

// Better English messages
const messages = [
  "Are you really sure? 😢",
  "Think again... please? 😭",
  "Come on, don't be like that 😣",
  "I’ll be really sad... 😞",
  "You’re breaking my heart 💔",
  "Last chance! 😫",
  "I might cry... 😭😭",
  "Okay... I still love you anyway 😔"
];

// Move NO button
noBtn.addEventListener("mouseover", () => {
  const maxX = window.innerWidth - noBtn.offsetWidth;
  const maxY = window.innerHeight - noBtn.offsetHeight;

  noBtn.style.position = "fixed";
  noBtn.style.left = Math.random() * maxX + "px";
  noBtn.style.top = Math.random() * maxY + "px";
});

// Click NO
noBtn.addEventListener("click", () => {
  noClicks++;
  question.innerText = messages[Math.min(noClicks, messages.length - 1)];

  let size = parseFloat(window.getComputedStyle(yesBtn).fontSize);
  yesBtn.style.fontSize = (size + 8) + "px";
  yesBtn.style.transform = "scale(1.2)";
});

// Click YES
yesBtn.addEventListener("click", () => {
  question.innerText = "Aww 🥰 I love you too so much ❤️";

  music.volume = 0.5;
  music.play();

  for (let i = 0; i < 60; i++) {
    let heart = document.createElement("div");
    heart.classList.add("heart");

    const emojis = ["❤️","💖","💕","💘","✨"];
    heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";
    heart.style.fontSize = (Math.random() * 25 + 20) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
  }
});
</script>

</body>
</html>
